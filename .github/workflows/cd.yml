name: Deploy to Cloud Run

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'Dockerfile'
      - 'pyproject.toml'
      - '.github/workflows/cd.yml'

env:
  # Actions pinned to majors that are Node.js 24 native (checkout v6, auth v3,
  # setup-gcloud v3). The force flag is kept as defensive belt-and-suspenders in
  # case a future action version regresses; harmless when everything is Node 24.
  # https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  PROJECT_ID: profitscout-fida8
  REGION: us-central1
  SERVICE: gammarips-mcp

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Check out code
      uses: actions/checkout@v6

    - name: Authenticate to GCP
      uses: google-github-actions/auth@v3
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }}

    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@v3

    # Use `gcloud run deploy --source=.` (same as the local `bash deploy.sh`
    # pattern). Cloud Run routes the build through Cloud Build, which stores
    # the image in the managed `cloud-run-source-deploy` AR repo. Avoids the
    # explicit `docker build && docker push` step that required
    # artifactregistry.writer on the per-service `gammarips-mcp` repo.
    #
    # Secrets mounted on the service: POLYGON_API_KEY (live option mids for
    # get_open_position) and GOOGLE_API_KEY (web_search tool). GOOGLE_CSE_ID
    # will be added once the Programmable Search Engine is provisioned.
    - name: Deploy to Cloud Run from source
      run: |
        gcloud run deploy ${{ env.SERVICE }} \
          --project=${{ env.PROJECT_ID }} \
          --region=${{ env.REGION }} \
          --source=. \
          --allow-unauthenticated \
          --memory=1Gi \
          --cpu=1 \
          --port=8080 \
          --timeout=300 \
          --min-instances=0 \
          --max-instances=2 \
          --set-secrets=POLYGON_API_KEY=POLYGON_API_KEY:latest,GOOGLE_API_KEY=GOOGLE_API_KEY:latest

    - name: Show deployment URL
      run: |
        URL=$(gcloud run services describe ${{ env.SERVICE }} --region=${{ env.REGION }} --format='value(status.url)')
        echo "## Deployment Complete" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Service URL:** ${URL}" >> $GITHUB_STEP_SUMMARY
        echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
